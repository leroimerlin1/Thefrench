<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sap Factory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');

    :root { --neon-green: #39ff14; }

    body, html {
      margin: 0; padding: 0; height: 100vh; overflow: hidden;
      background: #0a0a0a; color: white;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .neon-text { text-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green); }

    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(57, 255, 20, 0.2);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="bg-black border-b border-[#39ff14]/30 sticky top-0 z-50">
    <div class="flex items-center justify-between px-4 py-3">
      <button onclick="closeApp()" class="bg-zinc-900 hover:bg-zinc-800 px-4 py-1 rounded-full text-sm font-medium flex items-center gap-1">
        <i class="fa-solid fa-xmark"></i> Fermer
      </button>
      <div class="flex items-center gap-2">
        <span class="text-2xl font-bold tracking-widest neon-text" style="font-family: 'Press Start 2P', sans-serif;">SAP</span>
        <span class="text-[#39ff14] text-3xl font-black">FACTORY</span>
      </div>
      <div></div>
    </div>

    <div class="mx-4 mb-4 glass rounded-3xl p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-4xl">👋</div>
        <div>
          <p class="text-sm text-gray-400">Bienvenue</p>
          <p class="font-bold text-xl">LeRoiMerlin</p>
        </div>
      </div>
      <div class="bg-gradient-to-br from-[#39ff14] to-emerald-400 text-black font-bold text-3xl w-11 h-11 rounded-2xl flex items-center justify-center">⭐</div>
    </div>
  </div>

  <div class="px-4 pt-2 overflow-auto" style="height: calc(100vh - 185px);">
    <div id="active-filters" class="flex gap-2 mb-4 flex-wrap"></div>

    <button onclick="showCategorySheet()" class="w-full glass hover:border-[#39ff14] rounded-3xl p-5 flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-tags text-[#39ff14] text-2xl"></i>
        <div>
          <p class="font-semibold">Catégories</p>
          <p id="selected-cat-text" class="text-xs text-gray-400">Toutes</p>
        </div>
      </div>
      <i class="fa-solid fa-chevron-down text-[#39ff14]"></i>
    </button>

    <div class="flex justify-between items-center mb-4">
      <span class="text-lg font-bold">Nos Produits</span>
      <span id="product-count" class="text-[#39ff14] font-medium">12 produits</span>
    </div>

    <div class="grid grid-cols-2 gap-4 pb-24" id="products-grid"></div>
  </div>

  <!-- PANIER -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/95 z-[300] overflow-auto">
    <div class="p-4">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Votre Panier</h2>
        <button onclick="closeCart()" class="text-3xl">✕</button>
      </div>

      <div id="cart-items" class="space-y-4 mb-6"></div>

      <div class="border-t border-[#39ff14]/30 pt-4">
        <div class="flex justify-between text-xl">
          <span>Total :</span>
          <span id="cart-total" class="font-bold text-[#39ff14]"></span>
        </div>
      </div>

      <button onclick="showShippingForm()" 
              class="w-full mt-8 bg-[#39ff14] text-black font-bold py-5 rounded-3xl text-lg">
        Passer à la livraison →
      </button>
    </div>
  </div>

  <!-- FORMULAIRE LIVRAISON -->
  <div id="shipping-modal" class="hidden fixed inset-0 bg-black/95 z-[400] overflow-auto">
    <div class="p-4">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Informations de Livraison</h2>
        <button onclick="closeShipping()" class="text-3xl">✕</button>
      </div>

      <form id="shipping-form" class="space-y-4">
        <input type="text" id="name" placeholder="Nom complet" class="w-full bg-zinc-900 p-4 rounded-2xl" required>
        <input type="tel" id="phone" placeholder="Téléphone (avec WhatsApp)" class="w-full bg-zinc-900 p-4 rounded-2xl" required>
        <textarea id="address" rows="3" placeholder="Adresse complète + Code postal + Ville" class="w-full bg-zinc-900 p-4 rounded-2xl" required></textarea>
        <input type="text" id="city" placeholder="Ville" class="w-full bg-zinc-900 p-4 rounded-2xl" required>

        <button type="button" onclick="submitOrder()" 
                class="w-full mt-8 bg-green-500 hover:bg-green-400 text-black font-bold py-6 rounded-3xl text-xl">
          Confirmer la commande
        </button>
      </form>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#39ff14]/30 py-2 px-4 z-50">
    <div class="flex justify-around items-center">
      <a href="#" class="flex flex-col items-center text-[#39ff14]"><i class="fa-solid fa-house text-2xl"></i><span class="text-xs">Accueil</span></a>
      <a href="#" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-star text-2xl"></i><span class="text-xs">Avis</span></a>
      <a href="#" onclick="showCart()" class="flex flex-col items-center -mt-8 relative">
        <div class="bg-[#39ff14] text-black w-16 h-16 rounded-3xl flex items-center justify-center shadow-2xl">
          <i class="fa-solid fa-cart-shopping text-3xl"></i>
        </div>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-6 h-6 flex items-center justify-center rounded-full">0</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-circle-info text-2xl"></i><span class="text-xs">Infos</span></a>
      <a href="#" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-envelope text-2xl"></i><span class="text-xs">Contact</span></a>
    </div>
  </div>

  <!-- Category Sheet -->
  <div id="category-sheet" class="hidden fixed inset-0 z-[100] bg-black/80 flex items-end">
    <!-- Même sheet que précédemment -->
    <div class="glass bottom-sheet w-full rounded-t-3xl max-h-[75vh]">
      <div class="p-4 border-b border-white/10">
        <div class="w-12 h-1.5 bg-white/30 mx-auto rounded-full mb-4"></div>
        <h2 class="text-center text-xl font-bold">Catégories</h2>
      </div>
      <div class="p-4 space-y-2 max-h-[55vh] overflow-auto" id="category-list"></div>
      <div class="p-4 border-t border-white/10 flex gap-3">
        <button onclick="closeSheets()" class="flex-1 py-4 bg-zinc-800 rounded-2xl">Fermer</button>
        <button onclick="applyFilters()" class="flex-1 py-4 bg-[#39ff14] text-black font-bold rounded-2xl">Appliquer</button>
      </div>
    </div>
  </div>

  <script>
    let cart = [];
    let selectedCategories = [];

    const categoriesList = ["Tous","SACS LUXE","RUNNING","T-SHIRT","CLAQUETTES","ENSEMBLE","LUXE","CHAUSSURE LUXE","VESTE","CP/STONE","CASQUETTE/BONNET","PULL","CHAUSSURE SPORT","LUNETTES","BIJOUX","LORO PIANA","PORTEFEUILLE","MAILLOT FOOT","ALO","SHORT","ELECTRONIQUE","MONTRE","PARFUMS","CROCS","JEANS","CHEMISE","DOUDOUNE","SOUS-VÊTEMENTS","CASQUE ARAI"];

    const products = [
      { id: 1, name: "T-Shirt Oversize", category: "T-SHIRT", price: 85, images: ["https://picsum.photos/id/20/800/800"], desc: "..." },
      { id: 2, name: "Sac Loro Piana", category: "SACS LUXE", price: 650, images: ["https://picsum.photos/id/201/800/800"], desc: "..." },
      { id: 3, name: "Doudoune Moncler", category: "DOUDOUNE", price: 1450, images: ["https://picsum.photos/id/301/800/800"], desc: "..." },
      { id: 4, name: "Casquette CP Company", category: "CASQUETTE/BONNET", price: 120, images: ["https://picsum.photos/id/401/800/800"], desc: "..." },
      { id: 5, name: "Sneakers Luxe", category: "CHAUSSURE LUXE", price: 320, images: ["https://picsum.photos/id/106/800/800"], desc: "..." },
      { id: 6, name: "Ensemble ALO", category: "ENSEMBLE", price: 180, images: ["https://picsum.photos/id/180/800/800"], desc: "..." }
    ];

    function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) existing.quantity = (existing.quantity || 1) + 1;
      else cart.push({ ...product, quantity: 1 });
      updateCartCount();
      alert(`✅ ${product.name} ajouté au panier`);
    }

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      document.getElementById('cart-count').textContent = count;
    }

    function showCart() {
      if (cart.length === 0) return alert("Votre panier est vide");
      
      let html = '';
      let total = 0;

      cart.forEach((item, index) => {
        const itemTotal = item.price * (item.quantity || 1);
        total += itemTotal;
        html += `
          <div class="flex gap-4 bg-zinc-900 p-4 rounded-2xl">
            <img src="${item.images[0]}" class="w-20 h-20 object-cover rounded-xl">
            <div class="flex-1">
              <p class="font-bold">${item.name}</p>
              <p class="text-[#39ff14]">${item.price} € × ${item.quantity || 1}</p>
              <div class="flex gap-3 mt-2">
                <button onclick="changeQuantity(${index}, -1)" class="w-8 h-8 bg-zinc-800 rounded-xl">-</button>
                <span class="pt-1">${item.quantity || 1}</span>
                <button onclick="changeQuantity(${index}, 1)" class="w-8 h-8 bg-zinc-800 rounded-xl">+</button>
                <button onclick="removeFromCart(${index})" class="ml-auto text-red-500">Supprimer</button>
              </div>
            </div>
          </div>`;
      });

      document.getElementById('cart-items').innerHTML = html;
      document.getElementById('cart-total').textContent = total + " €";
      document.getElementById('cart-modal').classList.remove('hidden');
    }

    function changeQuantity(index, change) {
      cart[index].quantity = (cart[index].quantity || 1) + change;
      if (cart[index].quantity < 1) cart.splice(index, 1);
      showCart();
      updateCartCount();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      showCart();
      updateCartCount();
    }

    function closeCart() {
      document.getElementById('cart-modal').classList.add('hidden');
    }

    function showShippingForm() {
      closeCart();
      document.getElementById('shipping-modal').classList.remove('hidden');
    }

    function closeShipping() {
      document.getElementById('shipping-modal').classList.add('hidden');
    }

    function submitOrder() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const city = document.getElementById('city').value;

      if (!name || !phone || !address || !city) {
        alert("Veuillez remplir tous les champs");
        return;
      }

      let orderText = `🛒 Nouvelle Commande Sap Factory\n\n`;
      orderText += `👤 Client : ${name}\n`;
      orderText += `📞 Téléphone : ${phone}\n`;
      orderText += `📍 Adresse : ${address}, ${city}\n\n`;
      orderText += `🛍️ Produits :\n`;

      let total = 0;
      cart.forEach(item => {
        const qty = item.quantity || 1;
        orderText += `• ${item.name} × ${qty} = ${item.price * qty}€\n`;
        total += item.price * qty;
      });

      orderText += `\n💰 Total : ${total} €\n`;
      orderText += `🕒 ${new Date().toLocaleString('fr-FR')}`;

      // Envoi à @Sapfactory69
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.sendData(orderText); // Envoi au bot
        tg.openTelegramLink("https://t.me/Sapfactory69");
      } else {
        alert("Commande envoyée à @Sapfactory69 (simulation) :\n\n" + orderText);
      }

      alert("✅ Commande envoyée avec succès à @Sapfactory69 !");
      cart = [];
      updateCartCount();
      closeShipping();
    }

    // === Le reste du code (filtres, produits, detail, etc.) ===
    // (Identique à la version précédente, je l’ai gardé complet)

    function renderProducts() { /* ... même code que avant ... */ }
    function showDetail(product) { /* ... avec addToCart(product) */ }
    function closeDetail() { /* ... */ }
    function showCategorySheet() { /* ... */ }
    function toggleCategory(cat) { /* ... */ }
    function applyFilters() { /* ... */ }
    function updateActiveFilters() { /* ... */ }
    function removeCategory(cat) { /* ... */ }
    function closeSheets() { /* ... */ }
    function closeApp() { if (window.Telegram?.WebApp) window.Telegram.WebApp.close(); }

    window.onload = () => {
      if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor("#000000");
      }
      renderProducts();
      updateActiveFilters();
    };
  </script>
</body>
</html>
