<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BROLY 69 BOT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');

    :root {
      --neon-green: #39ff14;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    .neon-text {
      text-shadow: 0 0 10px var(--neon-green),
                   0 0 20px var(--neon-green);
    }

    .product-card {
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 0 25px rgba(57, 255, 20, 0.4);
    }

    .header-bg {
      background: linear-gradient(180deg, #111827 0%, #000000 100%);
    }

    .star-badge {
      background: linear-gradient(45deg, #39ff14, #00ff7f);
    }
  </style>
</head>
<body class="min-h-screen pb-20">

  <!-- HEADER -->
  <div class="header-bg border-b border-[#39ff14]/30 sticky top-0 z-50">
    <div class="flex items-center justify-between px-4 py-3">
      <button onclick="closeApp()" 
              class="bg-zinc-900 hover:bg-zinc-800 text-white px-4 py-1 rounded-full text-sm font-medium flex items-center gap-1">
        <i class="fa-solid fa-xmark"></i>
        <span>Fermer</span>
      </button>

      <div class="flex items-center gap-2">
        <span class="text-2xl font-bold tracking-widest neon-text" style="font-family: 'Press Start 2P', sans-serif;">BROLY</span>
        <span class="text-[#39ff14] text-3xl font-black">69</span>
      </div>

      <div class="flex items-center gap-3">
        <div class="bg-zinc-900 text-xs px-3 py-1 rounded-full flex items-center gap-1">
          <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
          <span>En ligne</span>
        </div>
        <button class="text-white">
          <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
        </button>
      </div>
    </div>

    <!-- Welcome -->
    <div class="mx-4 mb-4 bg-zinc-950 border border-[#39ff14]/20 rounded-2xl p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-4xl">
          👋
        </div>
        <div>
          <p class="text-sm text-gray-400">Bienvenue</p>
          <p class="font-bold text-xl">LeRoiMerlin</p>
        </div>
      </div>
      <div class="star-badge text-black font-bold text-3xl w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg">
        ⭐
      </div>
    </div>
  </div>

  <div class="px-4 pt-2">
    <!-- Products Header -->
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <div class="bg-[#39ff14] text-black px-4 py-2 rounded-2xl font-semibold flex items-center gap-2">
          <i class="fa-solid fa-filter"></i>
          <span>Produits</span>
        </div>
        <span class="bg-green-900/50 text-[#39ff14] text-sm px-4 py-2 rounded-2xl font-medium">
          67 produits
        </span>
      </div>
    </div>

    <!-- Filters -->
    <div class="grid grid-cols-2 gap-3 mb-6">
      <div class="bg-zinc-900 rounded-2xl p-4 flex items-center justify-between cursor-pointer hover:bg-zinc-800">
        <span class="font-medium">Catégories</span>
        <i class="fa-solid fa-chevron-down text-[#39ff14]"></i>
      </div>
      <div class="bg-zinc-900 rounded-2xl p-4 flex items-center justify-between cursor-pointer hover:bg-zinc-800">
        <span class="font-medium">Farms</span>
        <i class="fa-solid fa-chevron-down text-[#39ff14]"></i>
      </div>
    </div>

    <!-- Products Grid -->
    <div class="grid grid-cols-2 gap-4" id="products-grid">
      <!-- Product 1 -->
      <div class="product-card bg-zinc-950 border border-zinc-800 rounded-3xl overflow-hidden">
        <div class="relative">
          <img src="https://picsum.photos/id/1015/400/300" class="w-full h-40 object-cover" alt="Fruity Runtz">
          <div class="absolute top-3 left-3 bg-black/70 text-xs px-3 py-1 rounded-full flex items-center gap-1">
            <span>Dry TOP €%</span>
            <span class="text-red-500">🇫🇷</span>
          </div>
          <div class="absolute top-3 right-3 star-badge text-black text-xl w-7 h-7 rounded-2xl flex items-center justify-center">
            ★
          </div>
        </div>
        <div class="p-4">
          <p class="font-bold text-lg">Fruity Runtz</p>
          <p class="text-gray-400 text-sm flex items-center gap-1">
            <i class="fa-solid fa-house"></i> Unbranded
          </p>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="product-card bg-zinc-950 border border-zinc-800 rounded-3xl overflow-hidden">
        <div class="relative">
          <img src="https://picsum.photos/id/201/400/300" class="w-full h-40 object-cover" alt="Cake Fruit">
          <div class="absolute top-3 left-3 bg-black/70 text-xs px-3 py-1 rounded-full">
            90u Premium
          </div>
          <div class="absolute top-3 right-3 star-badge text-black text-xl w-7 h-7 rounded-2xl flex items-center justify-center">
            ★
          </div>
        </div>
        <div class="p-4">
          <p class="font-bold text-lg">Cake Fruit</p>
          <p class="text-gray-400 text-sm flex items-center gap-1">
            <i class="fa-solid fa-house"></i> Darks Farm
          </p>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="product-card bg-zinc-950 border border-zinc-800 rounded-3xl overflow-hidden">
        <div class="relative">
          <img src="https://picsum.photos/id/301/400/300" class="w-full h-40 object-cover" alt="House of Hash">
          <div class="absolute top-3 right-3 star-badge text-black text-xl w-7 h-7 rounded-2xl flex items-center justify-center">
            ★
          </div>
        </div>
        <div class="p-4">
          <p class="font-bold text-lg">House of Hash</p>
          <p class="text-orange-400 text-sm font-medium">Made in California</p>
        </div>
      </div>

      <!-- Product 4 -->
      <div class="product-card bg-zinc-950 border border-zinc-800 rounded-3xl overflow-hidden">
        <div class="relative">
          <img src="https://picsum.photos/id/401/400/300" class="w-full h-40 object-cover" alt="Gold Crown">
          <div class="absolute top-3 right-3 star-badge text-black text-xl w-7 h-7 rounded-2xl flex items-center justify-center">
            ★
          </div>
        </div>
        <div class="p-4">
          <p class="font-bold text-lg">Gold Crown</p>
          <p class="text-yellow-400 text-sm font-medium">Premium Hash</p>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#39ff14]/30 py-2 px-4 z-50">
    <div class="flex justify-around items-center text-center">
      <a href="#" class="flex flex-col items-center text-[#39ff14]">
        <i class="fa-solid fa-house text-2xl"></i>
        <span class="text-xs mt-1">Accueil</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-200">
        <i class="fa-solid fa-star text-2xl"></i>
        <span class="text-xs mt-1">Avis</span>
      </a>
      <a href="#" onclick="showCart()" class="flex flex-col items-center -mt-8">
        <div class="bg-[#39ff14] text-black w-16 h-16 rounded-3xl flex items-center justify-center shadow-2xl shadow-[#39ff14]/50">
          <i class="fa-solid fa-cart-shopping text-3xl"></i>
        </div>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-200">
        <i class="fa-solid fa-circle-info text-2xl"></i>
        <span class="text-xs mt-1">Infos</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-200">
        <i class="fa-solid fa-envelope text-2xl"></i>
        <span class="text-xs mt-1">Contact</span>
      </a>
    </div>
  </div>

  <!-- Cart Modal -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/90 flex items-end z-[100]">
    <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[85vh] overflow-auto">
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">Panier</h2>
          <button onclick="hideCart()" class="text-3xl">×</button>
        </div>
        <div class="text-center py-12 text-gray-400">
          <i class="fa-solid fa-cart-shopping text-6xl mb-4"></i>
          <p>Votre panier est vide</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function closeApp() {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.close();
      } else {
        alert("Mini App fermée (simulation)");
      }
    }

    function showCart() {
      document.getElementById('cart-modal').classList.remove('hidden');
    }

    function hideCart() {
      document.getElementById('cart-modal').classList.add('hidden');
    }

    // Telegram WebApp initialization
    window.onload = () => {
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#000000");
        tg.setBackgroundColor("#000000");
      }
    };

    // Tailwind script already included via CDN
  </script>
</body>
</html>
