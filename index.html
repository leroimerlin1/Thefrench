<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BROLY 69 BOT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');

    :root { --neon-green: #39ff14; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    .neon-text { text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); }

    .product-card {
      transition: all 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 0 25px rgba(57, 255, 20, 0.4);
    }

    .filter-active {
      background-color: #39ff14 !important;
      color: black !important;
      font-weight: 700;
    }
  </style>
</head>
<body class="min-h-screen pb-20">

  <!-- HEADER -->
  <div class="bg-black border-b border-[#39ff14]/30 sticky top-0 z-50">
    <div class="flex items-center justify-between px-4 py-3">
      <button onclick="closeApp()" class="bg-zinc-900 hover:bg-zinc-800 px-4 py-1 rounded-full text-sm font-medium flex items-center gap-1">
        <i class="fa-solid fa-xmark"></i> Fermer
      </button>

      <div class="flex items-center gap-2">
        <span class="text-2xl font-bold tracking-widest neon-text" style="font-family: 'Press Start 2P', sans-serif;">BROLY</span>
        <span class="text-[#39ff14] text-3xl font-black">69</span>
      </div>

      <div class="flex items-center gap-3">
        <div class="bg-zinc-900 text-xs px-3 py-1 rounded-full flex items-center gap-1">
          <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
          En ligne
        </div>
      </div>
    </div>

    <!-- Welcome -->
    <div class="mx-4 mb-4 bg-zinc-950 border border-[#39ff14]/20 rounded-2xl p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-4xl">👋</div>
        <div>
          <p class="text-sm text-gray-400">Bienvenue</p>
          <p class="font-bold text-xl">LeRoiMerlin</p>
        </div>
      </div>
      <div class="bg-gradient-to-br from-[#39ff14] to-green-400 text-black font-bold text-3xl w-10 h-10 rounded-2xl flex items-center justify-center">⭐</div>
    </div>
  </div>

  <div class="px-4 pt-2">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <div class="bg-[#39ff14] text-black px-5 py-2.5 rounded-2xl font-semibold flex items-center gap-2">
          <i class="fa-solid fa-filter"></i> Produits
        </div>
        <span id="product-count" class="bg-green-900/50 text-[#39ff14] text-sm px-4 py-2 rounded-2xl font-medium">
          67 produits
        </span>
      </div>
    </div>

    <!-- Filtres -->
    <div class="grid grid-cols-2 gap-3 mb-6">
      <button onclick="toggleCategoryFilter(this)" id="cat-filter"
              class="bg-zinc-900 hover:bg-zinc-800 rounded-2xl p-4 flex items-center justify-between text-left">
        <span class="font-medium">Catégories</span>
        <i class="fa-solid fa-chevron-down text-[#39ff14]"></i>
      </button>

      <button onclick="toggleFarmFilter(this)" id="farm-filter"
              class="bg-zinc-900 hover:bg-zinc-800 rounded-2xl p-4 flex items-center justify-between text-left">
        <span class="font-medium">Farms</span>
        <i class="fa-solid fa-chevron-down text-[#39ff14]"></i>
      </button>
    </div>

    <!-- Products Grid -->
    <div class="grid grid-cols-2 gap-4" id="products-grid"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#39ff14]/30 py-2 px-4 z-50">
    <div class="flex justify-around items-center text-center">
      <a href="#" class="flex flex-col items-center text-[#39ff14]">
        <i class="fa-solid fa-house text-2xl"></i>
        <span class="text-xs mt-1">Accueil</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400">
        <i class="fa-solid fa-star text-2xl"></i>
        <span class="text-xs mt-1">Avis</span>
      </a>
      <a href="#" onclick="showCart()" class="flex flex-col items-center -mt-8">
        <div class="bg-[#39ff14] text-black w-16 h-16 rounded-3xl flex items-center justify-center shadow-2xl">
          <i class="fa-solid fa-cart-shopping text-3xl"></i>
        </div>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400">
        <i class="fa-solid fa-circle-info text-2xl"></i>
        <span class="text-xs mt-1">Infos</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400">
        <i class="fa-solid fa-envelope text-2xl"></i>
        <span class="text-xs mt-1">Contact</span>
      </a>
    </div>
  </div>

  <script>
    // ==================== DONNÉES DES PRODUITS ====================
    const products = [
      { id: 1, name: "Fruity Runtz", category: "Fleurs", farm: "Unbranded", tag: "Dry TOP €%", flag: "🇫🇷", img: "https://picsum.photos/id/1015/400/300" },
      { id: 2, name: "Cake Fruit", category: "Fleurs", farm: "Darks Farm", tag: "90u Premium", img: "https://picsum.photos/id/201/400/300" },
      { id: 3, name: "House of Hash", category: "Hash", farm: "House of Hash", tag: "Made in California", img: "https://picsum.photos/id/301/400/300" },
      { id: 4, name: "Gold Crown", category: "Hash", farm: "Gold Crown", tag: "Premium Hash", img: "https://picsum.photos/id/401/400/300" },
      { id: 5, name: "Blueberry Kush", category: "Fleurs", farm: "Darks Farm", tag: "Indoor", img: "https://picsum.photos/id/106/400/300" },
      { id: 6, name: "Rosin Press", category: "Concentrés", farm: "Unbranded", tag: "Live Rosin", img: "https://picsum.photos/id/180/400/300" },
      { id: 7, name: "Gelato 41", category: "Fleurs", farm: "Darks Farm", tag: "90u", img: "https://picsum.photos/id/251/400/300" },
      { id: 8, name: "Moroccan Hash", category: "Hash", farm: "House of Hash", tag: "Traditional", img: "https://picsum.photos/id/866/400/300" }
    ];

    let selectedCategory = null;
    let selectedFarm = null;

    // ==================== RENDU DES PRODUITS ====================
    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';

      const filtered = products.filter(p => {
        const catMatch = !selectedCategory || p.category === selectedCategory;
        const farmMatch = !selectedFarm || p.farm === selectedFarm;
        return catMatch && farmMatch;
      });

      document.getElementById('product-count').textContent = `${filtered.length} produits`;

      if (filtered.length === 0) {
        grid.innerHTML = `<p class="col-span-2 text-center text-gray-400 py-10">Aucun produit trouvé</p>`;
        return;
      }

      filtered.forEach(product => {
        const card = document.createElement('div');
        card.className = "product-card bg-zinc-950 border border-zinc-800 rounded-3xl overflow-hidden cursor-pointer";
        card.innerHTML = `
          <div class="relative">
            <img src="${product.img}" class="w-full h-40 object-cover" alt="${product.name}">
            ${product.tag ? `
            <div class="absolute top-3 left-3 bg-black/70 text-xs px-3 py-1 rounded-full">
              ${product.tag}
            </div>` : ''}
            ${product.flag ? `<div class="absolute top-3 left-3 bg-black/70 text-xs px-3 py-1 rounded-full">${product.flag}</div>` : ''}
            <div class="absolute top-3 right-3 bg-gradient-to-br from-[#39ff14] to-green-400 text-black text-xl w-7 h-7 rounded-2xl flex items-center justify-center font-bold">★</div>
          </div>
          <div class="p-4">
            <p class="font-bold text-lg">${product.name}</p>
            <p class="text-gray-400 text-sm flex items-center gap-1">
              <i class="fa-solid fa-house"></i> ${product.farm}
            </p>
            <p class="text-xs text-[#39ff14] mt-1">${product.category}</p>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // ==================== FILTRES ====================
    function toggleCategoryFilter(btn) {
      const categories = ["Fleurs", "Hash", "Concentrés"];
      
      let menu = document.getElementById('cat-menu');
      if (menu) menu.remove();

      menu = document.createElement('div');
      menu.id = 'cat-menu';
      menu.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[100]";
      menu.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-6 w-[85%] max-w-xs">
          <h3 class="text-lg font-bold mb-4 text-center">Catégories</h3>
          <div class="space-y-2">
            <button onclick="selectCategory(null)" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-zinc-800 ${!selectedCategory ? 'filter-active' : ''}">
              Toutes les catégories
            </button>
            ${categories.map(cat => `
              <button onclick="selectCategory('${cat}')" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-zinc-800 ${selectedCategory === cat ? 'filter-active' : ''}">
                ${cat}
              </button>
            `).join('')}
          </div>
          <button onclick="this.parentElement.parentElement.remove()" class="mt-6 w-full py-3 text-red-400">Fermer</button>
        </div>
      `;
      document.body.appendChild(menu);
    }

    function toggleFarmFilter(btn) {
      const farms = ["Darks Farm", "House of Hash", "Unbranded", "Gold Crown"];
      
      let menu = document.getElementById('farm-menu');
      if (menu) menu.remove();

      menu = document.createElement('div');
      menu.id = 'farm-menu';
      menu.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[100]";
      menu.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-6 w-[85%] max-w-xs">
          <h3 class="text-lg font-bold mb-4 text-center">Farms</h3>
          <div class="space-y-2">
            <button onclick="selectFarm(null)" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-zinc-800 ${!selectedFarm ? 'filter-active' : ''}">
              Toutes les farms
            </button>
            ${farms.map(farm => `
              <button onclick="selectFarm('${farm}')" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-zinc-800 ${selectedFarm === farm ? 'filter-active' : ''}">
                ${farm}
              </button>
            `).join('')}
          </div>
          <button onclick="this.parentElement.parentElement.remove()" class="mt-6 w-full py-3 text-red-400">Fermer</button>
        </div>
      `;
      document.body.appendChild(menu);
    }

    function selectCategory(cat) {
      selectedCategory = cat;
      document.getElementById('cat-menu').remove();
      renderProducts();
    }

    function selectFarm(farm) {
      selectedFarm = farm;
      document.getElementById('farm-menu').remove();
      renderProducts();
    }

    // ==================== AUTRES FONCTIONS ====================
    function closeApp() {
      if (window.Telegram?.WebApp) window.Telegram.WebApp.close();
      else alert("Mini App fermée");
    }

    function showCart() {
      alert("🛒 Panier bientôt disponible !");
    }

    // Initialisation
    window.onload = () => {
      renderProducts();
      
      if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor("#000000");
      }
    };
  </script>
</body>
</html>
