<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sap Factory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');

    :root { --neon-green: #39ff14; }

    body, html {
      margin: 0; padding: 0; height: 100vh; overflow: hidden;
      background: #000000; color: white;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .neon-text { text-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="bg-black/90 border-b border-white/10 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
    <button onclick="closeApp()" class="bg-zinc-900 px-5 py-1.5 rounded-full text-sm flex items-center gap-2">
      <i class="fa-solid fa-xmark"></i> Fermer
    </button>

    <div class="flex flex-col items-center">
      <span class="text-2xl font-black tracking-widest neon-text">SAP</span>
      <span class="text-[#39ff14] text-xl -mt-1">FACTORY</span>
    </div>

    <div></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="overflow-auto" style="height: calc(100vh - 115px);">
    <div class="px-4 pt-6">
      <!-- Welcome -->
      <div class="bg-zinc-900 rounded-3xl p-5 flex items-center gap-4 mb-8">
        <div class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-3xl font-bold">L</div>
        <div>
          <p class="text-gray-400 text-sm">Bienvenue</p>
          <p class="font-bold text-xl">LeRoiMerlin</p>
        </div>
      </div>

      <!-- Catégories Button -->
      <button onclick="showCategorySheet()" 
              class="w-full bg-zinc-900 rounded-3xl p-6 flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
          <i class="fa-solid fa-tags text-3xl text-[#39ff14]"></i>
          <div>
            <p class="font-semibold text-lg">Catégories</p>
            <p id="selected-cat-text" class="text-gray-400">Toutes</p>
          </div>
        </div>
        <i class="fa-solid fa-chevron-down text-[#39ff14]"></i>
      </button>

      <div class="flex justify-between mb-5">
        <span class="text-2xl font-bold">Nos Produits</span>
        <span id="product-count" class="text-[#39ff14]">12 produits</span>
      </div>

      <div class="grid grid-cols-2 gap-4 pb-20" id="products-grid"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/10 py-2 z-50">
    <div class="flex justify-around items-center">
      <a href="#" class="text-[#39ff14]"><i class="fa-solid fa-house text-2xl"></i></a>
      <a href="#" class="text-gray-400"><i class="fa-solid fa-star text-2xl"></i></a>
      <a href="#" onclick="showCart()" class="relative -mt-9">
        <div class="bg-[#39ff14] text-black w-16 h-16 rounded-3xl flex items-center justify-center shadow-2xl">
          <i class="fa-solid fa-cart-shopping text-3xl"></i>
        </div>
      </a>
      <a href="#" class="text-gray-400"><i class="fa-solid fa-circle-info text-2xl"></i></a>
      <a href="#" class="text-gray-400"><i class="fa-solid fa-envelope text-2xl"></i></a>
    </div>
  </div>

  <!-- CATEGORY SHEET -->
  <div id="category-sheet" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-end">
    <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[75vh]">
      <div class="p-4 border-b border-white/10">
        <div class="w-12 h-1.5 bg-white/30 mx-auto rounded-full mb-4"></div>
        <h2 class="text-center text-xl font-bold">Catégories</h2>
      </div>
      <div id="category-list" class="p-4 space-y-2 max-h-[55vh] overflow-auto"></div>
      <div class="p-4 border-t border-white/10 flex gap-3">
        <button onclick="closeSheets()" class="flex-1 py-5 bg-zinc-800 rounded-3xl">Fermer</button>
        <button onclick="applyFilters()" class="flex-1 py-5 bg-[#39ff14] text-black font-bold rounded-3xl">Appliquer</button>
      </div>
    </div>
  </div>

  <script>
    let selectedCategories = [];

    const categoriesList = [
      "Tous", "SACS LUXE", "RUNNING", "T-SHIRT", "CLAQUETTES", "ENSEMBLE", "LUXE",
      "CHAUSSURE LUXE", "VESTE", "CP/STONE", "CASQUETTE/BONNET", "PULL",
      "CHAUSSURE SPORT", "LUNETTES", "BIJOUX", "LORO PIANA", "PORTEFEUILLE",
      "MAILLOT FOOT", "ALO", "SHORT", "ELECTRONIQUE", "MONTRE", "PARFUMS",
      "CROCS", "JEANS", "CHEMISE", "DOUDOUNE", "SOUS-VÊTEMENTS", "CASQUE ARAI"
    ];

    const products = [
      { name: "T-Shirt Oversize", category: "T-SHIRT", price: 85, img: "https://picsum.photos/id/20/400/400" },
      { name: "Sac Loro Piana", category: "SACS LUXE", price: 650, img: "https://picsum.photos/id/201/400/400" },
      { name: "Doudoune Moncler", category: "DOUDOUNE", price: 1450, img: "https://picsum.photos/id/301/400/400" },
      { name: "Casquette CP", category: "CASQUETTE/BONNET", price: 120, img: "https://picsum.photos/id/401/400/400" }
    ];

    function initFullscreen() {
      if (window.Telegram?.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#000000");
        tg.setBackgroundColor("#000000");
        tg.disableVerticalSwipes();
      }
    }

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';

      const filtered = products.filter(p => 
        selectedCategories.length === 0 || selectedCategories.includes(p.category)
      );

      document.getElementById('product-count').textContent = `${filtered.length} produits`;

      filtered.forEach(p => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer";
        div.onclick = () => alert(`Détail : ${p.name}`);
        div.innerHTML = `
          <img src="${p.img}" class="w-full h-44 object-cover">
          <div class="p-4">
            <p class="font-bold">${p.name}</p>
            <p class="text-[#39ff14] font-bold">${p.price} €</p>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    function showCategorySheet() {
      const list = document.getElementById('category-list');
      list.innerHTML = categoriesList.map(cat => `
        <div onclick="toggleCategory('${cat}')" class="p-5 rounded-2xl hover:bg-white/10 flex justify-between items-center ${selectedCategories.includes(cat) ? 'bg-white/10' : ''}">
          <span>${cat}</span>
          ${selectedCategories.includes(cat) ? '<i class="fa-solid fa-check text-[#39ff14]"></i>' : ''}
        </div>
      `).join('');
      document.getElementById('category-sheet').classList.remove('hidden');
    }

    function toggleCategory(cat) {
      if (selectedCategories.includes(cat)) {
        selectedCategories = selectedCategories.filter(c => c !== cat);
      } else {
        selectedCategories.push(cat);
      }
      showCategorySheet();
    }

    function applyFilters() {
      document.getElementById('selected-cat-text').textContent = selectedCategories.length ? selectedCategories.join(", ") : "Toutes";
      closeSheets();
      renderProducts();
    }

    function closeSheets() {
      document.getElementById('category-sheet').classList.add('hidden');
    }

    function closeApp() {
      if (window.Telegram?.WebApp) window.Telegram.WebApp.close();
    }

    function showCart() {
      alert("🛒 Panier");
    }

    window.onload = () => {
      initFullscreen();
      renderProducts();
    };
  </script>
</body>
</html>
