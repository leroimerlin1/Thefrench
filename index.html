<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sap Factory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');

    :root { --neon-green: #39ff14; }

    body, html {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: #050505;
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .neon-text { 
      text-shadow: 0 0 20px var(--neon-green), 
                   0 0 40px var(--neon-green); 
    }

    .glass {
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(57, 255, 20, 0.15);
    }

    .product-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product-card:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
    }
  </style>
</head>
<body class="relative">

  <!-- HEADER 2.0 - Très discret -->
  <div class="bg-black/90 border-b border-[#39ff14]/20 sticky top-0 z-50 backdrop-blur-xl">
    <div class="flex items-center justify-between px-5 py-3">
      <button onclick="closeApp()" class="text-gray-400 hover:text-white flex items-center gap-1 text-sm">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
      
      <div class="flex items-center gap-3">
        <span class="text-3xl font-black tracking-widest neon-text">SAP</span>
        <span class="text-[#39ff14] text-3xl font-black">FACTORY</span>
      </div>

      <div class="w-8"></div>
    </div>
  </div>

  <!-- Contenu principal -->
  <div class="overflow-auto" style="height: calc(100vh - 115px);">
    <div class="px-4 pt-4">
      <!-- Welcome -->
      <div class="glass rounded-3xl p-5 mb-6 flex items-center gap-4">
        <div class="w-14 h-14 bg-green-500/10 rounded-2xl flex items-center justify-center text-4xl flex-shrink-0">👋</div>
        <div>
          <p class="text-gray-400 text-sm">Bienvenue</p>
          <p class="font-bold text-2xl">LeRoiMerlin</p>
        </div>
      </div>

      <!-- Filtres actifs -->
      <div id="active-filters" class="flex gap-2 mb-5 flex-wrap"></div>

      <!-- Catégories -->
      <button onclick="showCategorySheet()" 
              class="w-full glass rounded-3xl p-6 flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
          <i class="fa-solid fa-tags text-3xl text-[#39ff14]"></i>
          <div>
            <p class="font-semibold text-lg">Catégories</p>
            <p id="selected-cat-text" class="text-gray-400">Toutes</p>
          </div>
        </div>
        <i class="fa-solid fa-chevron-down text-[#39ff14] text-2xl"></i>
      </button>

      <div class="flex justify-between items-center mb-5 px-1">
        <span class="text-2xl font-bold">Nos Produits</span>
        <span id="product-count" class="text-[#39ff14] font-medium">12 produits</span>
      </div>

      <div class="grid grid-cols-2 gap-4 pb-32" id="products-grid"></div>
    </div>
  </div>

  <!-- PAGE DÉTAIL -->
  <div id="detail-page" class="hidden fixed inset-0 bg-black z-[200] overflow-auto">
    <div class="sticky top-0 bg-black/95 border-b border-[#39ff14]/20 p-4 flex items-center z-10">
      <button onclick="closeDetail()" class="text-4xl pr-4">←</button>
      <h1 class="text-xl font-bold" id="detail-name"></h1>
    </div>
    <div class="p-4">
      <div class="rounded-3xl overflow-hidden mb-6">
        <img id="main-image" class="w-full h-96 object-cover" alt="">
      </div>
      <div class="flex gap-3 overflow-x-auto pb-6" id="thumbnail-gallery"></div>

      <div class="space-y-6">
        <div>
          <p class="text-5xl font-bold text-[#39ff14]" id="detail-price"></p>
        </div>
        <span id="detail-category" class="inline-block bg-zinc-900 px-6 py-3 rounded-3xl"></span>
        <div>
          <h3 class="font-bold text-lg mb-3">Description</h3>
          <p class="text-gray-300 leading-relaxed" id="detail-desc"></p>
        </div>
        <button onclick="addToCart(currentProduct)" 
                class="w-full bg-[#39ff14] text-black font-bold py-7 rounded-3xl text-2xl flex items-center justify-center gap-3">
          <i class="fa-solid fa-cart-plus"></i>
          Ajouter au panier
        </button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV 2.0 -->
  <div class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-[#39ff14]/20 py-3 px-6 z-50 backdrop-blur-2xl">
    <div class="flex justify-around items-center">
      <a href="#" class="flex flex-col items-center text-[#39ff14]"><i class="fa-solid fa-house text-2xl"></i></a>
      <a href="#" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-star text-2xl"></i></a>
      <a href="#" onclick="showCart()" class="flex flex-col items-center -mt-10 relative">
        <div class="bg-[#39ff14] text-black w-20 h-20 rounded-3xl flex items-center justify-center shadow-2xl shadow-[#39ff14]/70">
          <i class="fa-solid fa-cart-shopping text-4xl"></i>
        </div>
        <span id="cart-count" class="absolute -top-2 -right-1 bg-red-500 text-white text-xs font-bold w-7 h-7 flex items-center justify-center rounded-full">0</span>
      </a>
      <a href="#" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-circle-info text-2xl"></i></a>
      <a href="#" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-envelope text-2xl"></i></a>
    </div>
  </div>

  <!-- Category Sheet -->
  <div id="category-sheet" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-end">
    <div class="glass bottom-sheet w-full rounded-t-3xl max-h-[80vh]">
      <div class="p-4 border-b border-white/10">
        <div class="w-12 h-1.5 bg-white/30 mx-auto rounded-full mb-4"></div>
        <h2 class="text-center text-2xl font-bold">Catégories</h2>
      </div>
      <div class="p-4 space-y-2 max-h-[60vh] overflow-auto" id="category-list"></div>
      <div class="p-4 border-t border-white/10 flex gap-3">
        <button onclick="closeSheets()" class="flex-1 py-5 bg-zinc-800 rounded-3xl">Fermer</button>
        <button onclick="applyFilters()" class="flex-1 py-5 bg-[#39ff14] text-black font-bold rounded-3xl">Appliquer</button>
      </div>
    </div>
  </div>

  <script>
    let cart = [];
    let selectedCategories = [];
    let currentProduct = null;

    const categoriesList = ["Tous","SACS LUXE","RUNNING","T-SHIRT","CLAQUETTES","ENSEMBLE","LUXE","CHAUSSURE LUXE","VESTE","CP/STONE","CASQUETTE/BONNET","PULL","CHAUSSURE SPORT","LUNETTES","BIJOUX","LORO PIANA","PORTEFEUILLE","MAILLOT FOOT","ALO","SHORT","ELECTRONIQUE","MONTRE","PARFUMS","CROCS","JEANS","CHEMISE","DOUDOUNE","SOUS-VÊTEMENTS","CASQUE ARAI"];

    const products = [
      { id: 1, name: "T-Shirt Oversize", category: "T-SHIRT", price: 85, images: ["https://picsum.photos/id/20/800/800"], desc: "T-shirt luxe en coton premium." },
      { id: 2, name: "Sac Loro Piana", category: "SACS LUXE", price: 650, images: ["https://picsum.photos/id/201/800/800"], desc: "Sac édition limitée." },
      { id: 3, name: "Doudoune Moncler", category: "DOUDOUNE", price: 1450, images: ["https://picsum.photos/id/301/800/800"], desc: "Doudoune ultra chaude." },
      { id: 4, name: "Casquette CP Company", category: "CASQUETTE/BONNET", price: 120, images: ["https://picsum.photos/id/401/800/800"], desc: "Casquette iconique." }
    ];

    function initFullscreen() {
      if (window.Telegram?.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#000000");
        tg.setBackgroundColor("#050505");
        tg.disableVerticalSwipes();
      }
    }

    // Panier, produits, détail, etc. (même logique que précédemment)
    function addToCart(product) {
      const existing = cart.find(i => i.id === product.id);
      if (existing) existing.quantity = (existing.quantity || 1) + 1;
      else cart.push({...product, quantity: 1});
      updateCartCount();
    }

    function updateCartCount() {
      const count = cart.reduce((a, b) => a + (b.quantity || 1), 0);
      document.getElementById('cart-count').textContent = count;
    }

    function showCart() {
      if (cart.length === 0) return alert("Panier vide");
      // ... (code du panier complet comme dans le message précédent)
      alert("Panier ouvert (version 2.0)");
    }

    function closeApp() {
      if (window.Telegram?.WebApp) window.Telegram.WebApp.close();
    }

    // Render Products (simplifié pour l'exemple)
    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = "product-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer";
        div.onclick = () => { currentProduct = p; document.getElementById('detail-page').classList.remove('hidden'); };
        div.innerHTML = `
          <img src="${p.images[0]}" class="w-full h-52 object-cover">
          <div class="p-4">
            <p class="font-bold">${p.name}</p>
            <p class="text-[#39ff14] font-bold">${p.price} €</p>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    window.onload = () => {
      initFullscreen();
      renderProducts();
    };
  </script>
</body>
</html>
